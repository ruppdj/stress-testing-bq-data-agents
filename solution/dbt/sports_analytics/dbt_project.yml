name: 'sports_analytics'
version: '1.0.0'
config-version: 2

profile: 'sports_analytics'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  sports_analytics:
    team_crosswalk:
      +column_types:
        raw_value: string
        canonical_abbrev: string
    player_name_crosswalk:
      +column_types:
        raw_value: string
        canonical_name: string

models:
  sports_analytics:
    staging:
      +materialized: view
    marts:
      +materialized: table
      +schema: nba_marts
      +persist_docs:
        relation: true
        columns: true
